<!-- Registro de usuarios-->
<section id="registro" class="form-section">
    <h2>Registro de Usuario</h2>
    <form id="registerForm" class="form" autocomplete="on" novalidate>
        <fildeset>
            <legend>Información Personal</legend>
            <label for="r-name">Nombre completo
                <input id="r-name" name="name" type="text" required pattern="[a-z]{4,8}"></label>
            <br>
            <label for="r-email">Correo electrónico
                <input id="r-email" name="email" type="email" required></label>
            <br>
            <label for="r-phone">Teléfono
                <input id="r-phone" name="phone" type="tel"></label>
            <br>
            <label for="r-password">Contraseña
                <input id="r-password" name="password" type="password" minlength="6" required></label>
            <br>
            <div class="form-actions">
                <button type="submit" class="btn">Crear cuenta</button>
                <button type="button" class="btn alt" id="fillDemo">Ejemplo</button>
            </div>
            <div id="registerMsg" class="msg" aria-live="polite"></div>
        </fildeset>
        <button class="btn order" onclick="location.href='index.html'">menu principal</button>

    </form>
</section>
